const formats = {
    "10": { rp: 3, commands: 4, project: 1, support: 2 },
    "15": { rp: 4, commands: 5, project: 2, support: 4 },

};

let activeInterview = {
    name: "",
    format: "",
    selectedQuestions: [],
    results: {}
};

function getRandomSubarray(arr, size) {
    let shuffled = arr.slice(0), i = arr.length, temp, index;
    while (i--) {
        index = Math.floor((i + 1) * Math.random());
        temp = shuffled[index];
        shuffled[index] = shuffled[i];
        shuffled[i] = temp;
    }
    return shuffled.slice(0, size);
}

function startInterview() {
    const nameInput = document.getElementById("candidate-name").value.trim();
    const passwordInput = document.getElementById("panel-password").value;

    if (!nameInput) {
        alert("Please enter a Candidate Name first!");
        return;
    }

    if (passwordInput !== MASTER_PASSWORD) {
        alert("Incorrect Security Password! Access Denied.");
        return;
    }

    const formatVal = document.getElementById("format-select").value;
    const blueprint = formats[formatVal];
    
    activeInterview.name = nameInput;
    activeInterview.format = formatVal;
    activeInterview.selectedQuestions = [];
    activeInterview.results = {};

    for (const category in blueprint) {
        const countNeeded = blueprint[category];
        const selected = getRandomSubarray(dataPool[category], countNeeded).map(item => ({
            ...item,
            category: category.toUpperCase()
        }));
        activeInterview.selectedQuestions.push(...selected);
    }

    activeInterview.selectedQuestions = getRandomSubarray(activeInterview.selectedQuestions, activeInterview.selectedQuestions.length);

    document.getElementById("runtime-name").innerText = activeInterview.name;
    document.getElementById("runtime-total").innerText = activeInterview.selectedQuestions.length;
    document.getElementById("runtime-score").innerText = "0";
    
    renderQuestions();

    document.getElementById("setup-screen").classList.add("hidden");
    document.getElementById("quiz-screen").classList.remove("hidden");
}

function renderQuestions() {
    const container = document.getElementById("questions-container");
    container.innerHTML = "";

    activeInterview.selectedQuestions.forEach((qObj, index) => {
        const card = document.createElement("div");
        card.className = "question-card";
        card.innerHTML = `
            <div class="question-meta">Question ${index + 1} — ${qObj.category}</div>
            <div class="question-text">${qObj.q}</div>
            <div class="answer-text"><strong>Expected Answer:</strong> ${qObj.a}</div>
            <div class="btn-group">
                <button type="button" class="btn-opt btn-correct" id="correct-${index}" onclick="setVerdict(${index}, true)">1. Correct (+1)</button>
                <button type="button" class="btn-opt btn-wrong" id="wrong-${index}" onclick="setVerdict(${index}, false)">2. Wrong (+0)</button>
            </div>
        `;
        container.appendChild(card);
    });
}

function setVerdict(index, isCorrect) {
    activeInterview.results[index] = isCorrect;

    const correctBtn = document.getElementById(`correct-${index}`);
    const wrongBtn = document.getElementById(`wrong-${index}`);

    if (isCorrect) {
        correctBtn.classList.add("active");
        wrongBtn.classList.remove("active");
    } else {
        wrongBtn.classList.add("active");
        correctBtn.classList.remove("active");
    }

    let activeScore = 0;
    for (const key in activeInterview.results) {
        if (activeInterview.results[key] === true) activeScore++;
    }
    document.getElementById("runtime-score").innerText = activeScore;
}

function submitInterview() {
    const totalQuestionsCount = activeInterview.selectedQuestions.length;
    const answeredCount = Object.keys(activeInterview.results).length;

    if (answeredCount < totalQuestionsCount) {
        if (!confirm("Some questions haven't been graded yet. Are you sure you want to finish and log data?")) {
            return;
        }
    }

    document.getElementById("submit-btn").innerText = "Sending Data...";
    document.getElementById("submit-btn").disabled = true;

    let finalScore = 0;
    let detailsText = "";

    activeInterview.selectedQuestions.forEach((qObj, index) => {
        const status = activeInterview.results[index];
        let verdict = "❌ WRONG/NO ANSWER";
        if (status === true) {
            finalScore++;
            verdict = "✅ CORRECT";
        }
        const cleanQ = qObj.q.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        detailsText += `\n<b>${index + 1}. Q:</b> ${cleanQ}\n   <i>Verdict:</i> ${verdict}\n`;
    });

    const percentage = ((finalScore / totalQuestionsCount) * 100).toFixed(1);
    const passedStatus = percentage >= 60.0 ? "PASSED 🎉" : "FAILED ❌";

    const cleanName = activeInterview.name.replace(/</g, "&lt;").replace(/>/g, "&gt;");
    const message = `🚀 <b>NEW INTERVIEW REPORT</b>\n\n` +
                    `👤 <b>Candidate:</b> ${cleanName}\n` +
                    `📊 <b>Format Choice:</b> ${activeInterview.format} Questions\n` +
                    `🎯 <b>Final Score:</b> ${finalScore} / ${totalQuestionsCount} (${percentage}%)\n` +
                    `📈 <b>Status Result:</b> ${passedStatus}\n` +
                    `\n-----------------------------\n` +
                    `📝 <b>Detailed Assessment Log:</b>` + detailsText;

    const url = `https://api.telegram.org/bot${TG_TOKEN}/sendMessage`;
    
    fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            chat_id: TG_USER_ID,
            text: message,
            parse_mode: "HTML"
        })
    })
    .then(response => {
        if (response.ok) {
            alert("Report successfully logged and sent to Telegram Bot!");
        } else {
            alert("Report generated locally, but failed to connect to Telegram API. Make sure you pressed 'Start' on your bot first!");
        }
        resetToNext();
    })
    .catch(err => {
        console.error(err);
        alert("Network structural connection error trying to contact Telegram.");
        resetToNext();
    });
}

function resetToNext() {
    document.getElementById("candidate-name").value = "";
    document.getElementById("panel-password").value = "";
    document.getElementById("format-select").selectedIndex = 0;
    document.getElementById("submit-btn").innerText = "Submit Report & Send to Telegram";
    document.getElementById("submit-btn").disabled = false;

    document.getElementById("quiz-screen").classList.add("hidden");
    document.getElementById("setup-screen").classList.remove("hidden");
    window.scrollTo(0,0);
}
</script>
